# Reference shape of the file scripts/jira-init.sh writes to .jira/config.yml.
# Do not fill this in by hand — run the script and answer the prompts.
# The real file is gitignored; this template is the only Jira config tracked.

installation: Cloud
server: https://<your-workspace>.atlassian.net
login: <your-atlassian-email>
project:
    key: <YOUR_PROJECT_KEY>
    type: classic
board:
    id: 0
    name: <Your Board Name>
    type: scrum
epic:
    name: customfield_10011
    link: customfield_10014
