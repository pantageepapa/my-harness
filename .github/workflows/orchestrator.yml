# Orchestrator (Jira Dev Ready)
#
# Deterministic router from Jira to the dev agents. Fires per-ticket on the
# "Dev Ready" status transition and dispatches by story points:
#   SP <= 3  -> junior-dev.yml
#   SP >= 4  -> senior-dev.yml (default phase: propose)
#   no SP    -> workflow fails loudly; no downstream dispatch
#
# Trigger surface
# ---------------
# repository_dispatch (event_type: jira-dev-ready) is the production path.
# workflow_dispatch is kept for manual recovery and dry-runs from the
# Actions UI.
#
# Jira-side setup (one-time, configured in Jira automation, not in code)
# ----------------------------------------------------------------------
# 1. Create a fine-grained GitHub PAT with `Contents: read` and
#    `Actions: read and write` on this repo. Store as a Jira automation
#    secret (e.g. GITHUB_DISPATCH_PAT).
# 2. Add a Jira automation rule:
#    - Trigger: Issue transitioned -> To status: "Dev Ready"
#    - Action:  Send web request
#        URL:    https://api.github.com/repos/<owner>/<repo>/dispatches
#        Method: POST
#        Headers:
#          Authorization: Bearer <PAT>
#          Accept: application/vnd.github+json
#          Content-Type: application/json
#        Body:
#          {"event_type":"jira-dev-ready","client_payload":{"ticket_key":"{{issue.key}}"}}

name: Orchestrator (Jira Dev Ready)

on:
  repository_dispatch:
    types: [jira-dev-ready]
  workflow_dispatch:
    inputs:
      ticket_key:
        description: 'Jira ticket key (e.g. KAN-42)'
        required: true
        type: string

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install jira CLI
        run: bash scripts/install-jira-cli.sh

      - name: Put bin/ on PATH
        run: echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Write jira config
        env:
          JIRA_SERVER: ${{ vars.JIRA_SERVER }}
          JIRA_LOGIN: ${{ vars.JIRA_LOGIN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_BOARD_ID: ${{ vars.JIRA_BOARD_ID }}
        run: |
          set -euo pipefail
          : "${JIRA_SERVER:?JIRA_SERVER repo variable is required}"
          : "${JIRA_LOGIN:?JIRA_LOGIN repo variable is required}"
          : "${JIRA_PROJECT_KEY:?JIRA_PROJECT_KEY repo variable is required}"
          mkdir -p .jira
          cat > .jira/config.yml <<EOF
          installation: Cloud
          server: ${JIRA_SERVER}
          login: ${JIRA_LOGIN}
          project:
              key: ${JIRA_PROJECT_KEY}
              type: classic
          board:
              id: ${JIRA_BOARD_ID:-0}
          EOF

      - name: Resolve ticket and route
        env:
          TICKET_KEY: ${{ github.event.client_payload.ticket_key || inputs.ticket_key }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_CONFIG_FILE: ${{ github.workspace }}/.jira/config.yml
        run: |
          set -euo pipefail
          : "${TICKET_KEY:?ticket_key is required (client_payload.ticket_key or inputs.ticket_key)}"

          sp=$(jira issue view "$TICKET_KEY" --raw | jq -r '.fields.customfield_10016 // empty')
          if [ -z "$sp" ] || [ "$sp" = "null" ]; then
            echo "::error::${TICKET_KEY} has no story points; refusing to route. Estimate the ticket and re-trigger."
            exit 1
          fi

          sp_int=$(printf '%.0f' "$sp")
          if [ "$sp_int" -le 3 ]; then
            target=junior-dev
          else
            target=senior-dev
          fi

          echo "Routing ${TICKET_KEY} (SP=${sp_int}) -> ${target}"
          gh workflow run "${target}.yml" -f ticket_key="$TICKET_KEY"
          jira issue move "$TICKET_KEY" "In Progress"
